<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>消化器論文アーカイブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f7f6f2;
    --card: #ffffff;
    --ink: #22302b;
    --sub: #6b7772;
    --pine: #0f6b5c;
    --pine-soft: #eaf3f0;
    --amber: #c77d2e;
    --amber-soft: #f6efe2;
    --line: #e2e6e2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Noto Sans JP", "Hiragino Sans", sans-serif;
    font-size: 15px; line-height: 1.75;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(247,246,242,.92); backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 14px 20px;
  }
  .head-inner { max-width: 860px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  h1 {
    font-family: "Shippori Mincho B1", serif; font-weight: 800;
    font-size: 20px; margin: 0; letter-spacing: .04em;
  }
  h1 .sub { font-size: 12px; color: var(--sub); font-family: "Noto Sans JP", sans-serif; font-weight: 400; margin-left: 10px; letter-spacing: 0; }
  #search {
    flex: 1; min-width: 200px; max-width: 360px; margin-left: auto;
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--card); font: inherit; font-size: 14px; outline: none;
  }
  #search:focus { border-color: var(--pine); box-shadow: 0 0 0 3px var(--pine-soft); }

  .filters { max-width: 860px; margin: 14px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid var(--line); background: var(--card); color: var(--sub);
    border-radius: 999px; padding: 4px 14px; font-size: 12.5px; cursor: pointer;
    transition: .15s;
  }
  .chip:hover { border-color: var(--pine); color: var(--pine); }
  .chip.on { background: var(--pine); border-color: var(--pine); color: #fff; }
  .chip:focus-visible { outline: 2px solid var(--pine); outline-offset: 2px; }

  main { max-width: 860px; margin: 0 auto; padding: 24px 20px 80px; }
  #stats { color: var(--sub); font-size: 13px; margin-bottom: 20px; }

  /* --- 回診日: カルテのインデックスタブ風の日付マーカー --- */
  .day { display: grid; grid-template-columns: 84px 1fr; gap: 18px; margin-bottom: 8px; }
  .day-tab {
    position: sticky; top: 76px; align-self: start;
    writing-mode: vertical-rl; text-orientation: mixed;
    font-family: "Shippori Mincho B1", serif; font-weight: 600;
    font-size: 15px; letter-spacing: .18em; color: var(--pine);
    background: var(--pine-soft); border-left: 3px solid var(--pine);
    border-radius: 0 8px 8px 0; padding: 14px 8px; margin-top: 4px;
    min-height: 120px; text-align: center;
  }
  .day-papers { padding-bottom: 26px; border-bottom: 1px dashed var(--line); margin-bottom: 26px; }

  .paper {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 14px;
  }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .badge { background: var(--pine); color: #fff; font-size: 11px; border-radius: 4px; padding: 2px 9px; }
  .tag { background: var(--amber-soft); color: var(--amber); font-size: 11px; border-radius: 4px; padding: 2px 9px; }
  .t-ja { font-size: 16.5px; font-weight: 700; margin: 0 0 2px; line-height: 1.55; }
  .t-en { font-size: 12.5px; color: var(--sub); margin: 0 0 6px; }
  .meta { font-size: 12.5px; color: var(--sub); margin-bottom: 10px; }
  .summary { margin: 0 0 10px; }
  details { margin-bottom: 10px; }
  summary { cursor: pointer; color: var(--pine); font-size: 13.5px; font-weight: 500; }
  details ul { margin: 8px 0 4px; padding-left: 22px; font-size: 14px; }
  .rel { font-size: 13.5px; background: var(--pine-soft); border-left: 3px solid var(--pine); padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 12px; }
  .links a { color: var(--pine); font-size: 13.5px; margin-right: 16px; text-decoration: none; border-bottom: 1px solid transparent; }
  .links a:hover { border-bottom-color: var(--pine); }

  .empty { text-align: center; color: var(--sub); padding: 60px 0; }

  @media (max-width: 640px) {
    .day { grid-template-columns: 1fr; }
    .day-tab {
      writing-mode: horizontal-tb; position: static; min-height: 0;
      border-left: none; border-top: 3px solid var(--pine);
      border-radius: 0 0 8px 8px; padding: 6px 14px; width: fit-content;
    }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1>消化器論文アーカイブ<span class="sub">毎朝の回診記録</span></h1>
    <input id="search" type="search" placeholder="タイトル・要約・タグを検索" aria-label="論文を検索">
  </div>
  <div class="filters" id="filters" role="group" aria-label="タグで絞り込み"></div>
</header>

<main>
  <div id="stats"></div>
  <div id="feed"></div>
</main>

<script>
let papers = [];
let activeTag = null;

const esc = s => (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function load() {
  try {
    const r = await fetch("data/papers.json", { cache: "no-store" });
    papers = await r.json();
  } catch { papers = []; }
  buildFilters();
  render();
}

function buildFilters() {
  const count = {};
  papers.forEach(p => (p.tags || []).forEach(t => count[t] = (count[t] || 0) + 1));
  const top = Object.entries(count).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const box = document.getElementById("filters");
  box.innerHTML = top.map(([t]) =>
    `<button class="chip" data-tag="${esc(t)}">${esc(t)}</button>`).join("");
  box.querySelectorAll(".chip").forEach(b => b.onclick = () => {
    activeTag = activeTag === b.dataset.tag ? null : b.dataset.tag;
    box.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", c.dataset.tag === activeTag));
    render();
  });
}

function matches(p, q) {
  if (activeTag && !(p.tags || []).includes(activeTag)) return false;
  if (!q) return true;
  const hay = [p.title, p.title_ja, p.summary, p.journal, (p.tags || []).join(" "),
               (p.key_points || []).join(" ")].join(" ").toLowerCase();
  return q.toLowerCase().split(/\s+/).every(w => hay.includes(w));
}

function card(p) {
  const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const kp = (p.key_points || []).map(k => `<li>${esc(k)}</li>`).join("");
  let links = `<a href="${esc(p.pubmed_url)}" target="_blank" rel="noopener">PubMed</a>`;
  if (p.doi_url) links += `<a href="${esc(p.doi_url)}" target="_blank" rel="noopener">本文 (DOI)</a>`;
  if (p.pmc_url) links += `<a href="${esc(p.pmc_url)}" target="_blank" rel="noopener">無料全文 (PMC)</a>`;
  return `<article class="paper">
    <div class="badges"><span class="badge">${esc(p.study_type)}</span>${tags}</div>
    <p class="t-ja">${esc(p.title_ja || p.title)}</p>
    <p class="t-en">${esc(p.title)}</p>
    <p class="meta">${esc(p.journal)} (${esc(p.year)}) — ${esc(p.authors)}</p>
    <p class="summary">${esc(p.summary)}</p>
    ${kp ? `<details><summary>重要ポイント</summary><ul>${kp}</ul></details>` : ""}
    ${p.clinical_relevance ? `<div class="rel">${esc(p.clinical_relevance)}</div>` : ""}
    <div class="links">${links}</div>
  </article>`;
}

function render() {
  const q = document.getElementById("search").value.trim();
  const hits = papers.filter(p => matches(p, q));

  document.getElementById("stats").textContent =
    papers.length === 0 ? "" : `${hits.length}本を表示(全${papers.length}本)`;

  const feed = document.getElementById("feed");
  if (papers.length === 0) {
    feed.innerHTML = `<div class="empty">まだ論文がありません。<br>明朝の自動実行、または Actions タブの手動実行(Run workflow)後にここへ蓄積されます。</div>`;
    return;
  }
  if (hits.length === 0) {
    feed.innerHTML = `<div class="empty">条件に合う論文が見つかりません。検索語やタグを変えてみてください。</div>`;
    return;
  }

  const byDate = {};
  hits.forEach(p => (byDate[p.date] = byDate[p.date] || []).push(p));
  feed.innerHTML = Object.keys(byDate).sort().reverse().map(d => {
    const [y, m, day] = d.split("-");
    return `<section class="day">
      <div class="day-tab">${y}.${m}.${day}</div>
      <div class="day-papers">${byDate[d].map(card).join("")}</div>
    </section>`;
  }).join("");
}

document.getElementById("search").addEventListener("input", render);
load();
</script>
</body>
</html>
